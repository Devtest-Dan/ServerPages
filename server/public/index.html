<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ServerPages</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="header">
    <h1>ServerPages</h1>
    <span class="status-dot" id="statusDot"></span>
    <nav>
      <a href="/" class="active">Dashboard</a>
      <a href="/live.html">Live</a>
      <a href="/media.html">Media</a>
    </nav>
  </div>

  <div class="container">
    <div class="dashboard-grid">
      <!-- Live Stream Card -->
      <a href="/live.html" class="card card-link">
        <div class="card-header">
          <span class="live-badge" id="liveBadge" style="display:none">LIVE</span>
          <h2>Screen Stream</h2>
          <span id="modeTag" style="margin-left:auto;font-size:11px;color:var(--text-muted);text-transform:uppercase"></span>
        </div>
        <div class="card-body">
          <div class="player-wrapper">
            <video id="preview" muted autoplay playsinline></video>
            <div class="player-overlay" id="previewOverlay">
              Checking stream...
            </div>
          </div>
        </div>
      </a>

      <!-- Media Browser Card -->
      <a href="/media.html" class="card card-link">
        <div class="card-header">
          <h2>Media Browser</h2>
        </div>
        <div class="card-body">
          <p style="color: var(--text-muted); margin-bottom: 16px;">
            Browse and play media files on C: and D: drives.
          </p>
          <div class="drive-selector" onclick="event.preventDefault()">
            <a href="/media.html?dir=C:/" class="drive-btn">C: Drive</a>
            <a href="/media.html?dir=D:/" class="drive-btn">D: Drive</a>
          </div>
          <div id="filePreview" style="color: var(--text-muted); font-size: 13px;">
            Loading file count...
          </div>
        </div>
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script>
    const dot = document.getElementById('statusDot');
    const badge = document.getElementById('liveBadge');
    const modeTag = document.getElementById('modeTag');
    const overlay = document.getElementById('previewOverlay');
    const previewVideo = document.getElementById('preview');

    let previewHls = null;
    let previewActive = false;

    async function checkStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const mode = data.streamMode || 'hls';

        modeTag.textContent = mode === 'ws' ? 'Low Latency' : 'HLS';

        if (!data.ffmpeg) {
          setOffline('FFmpeg not running');
          return;
        }

        if (!data.streamReady) {
          setOffline('FFmpeg starting...');
          return;
        }

        // Stream ready
        dot.classList.add('live');
        badge.style.display = '';

        if (mode === 'hls' && !previewActive) {
          initHlsPreview();
        } else if (mode === 'ws' && !previewActive) {
          // In WS mode, show a static message — preview requires full MSE setup
          overlay.textContent = 'Low Latency mode — click to watch';
          overlay.classList.remove('hidden');
          previewActive = true;
        }
      } catch (e) {
        setOffline('Server unreachable');
      }
    }

    function setOffline(msg) {
      dot.classList.remove('live');
      badge.style.display = 'none';
      overlay.textContent = msg;
      overlay.classList.remove('hidden');
      previewActive = false;
      if (previewHls) { previewHls.destroy(); previewHls = null; }
    }

    function initHlsPreview() {
      if (previewActive) return;
      previewActive = true;

      if (Hls.isSupported()) {
        previewHls = new Hls({ liveDurationInfinity: true, enableWorker: true });
        previewHls.loadSource('/hls/screen.m3u8');
        previewHls.attachMedia(previewVideo);
        previewHls.on(Hls.Events.MANIFEST_PARSED, () => {
          overlay.classList.add('hidden');
          previewVideo.play().catch(() => {});
        });
        previewHls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) {
            previewHls.destroy();
            previewHls = null;
            previewActive = false;
            setOffline('Stream offline — retrying...');
          }
        });
      } else if (previewVideo.canPlayType('application/vnd.apple.mpegurl')) {
        previewVideo.src = '/hls/screen.m3u8';
        previewVideo.addEventListener('loadedmetadata', () => {
          overlay.classList.add('hidden');
          previewVideo.play().catch(() => {});
        }, { once: true });
        previewVideo.addEventListener('error', () => {
          previewActive = false;
          setOffline('Stream offline — retrying...');
        }, { once: true });
      }
    }

    checkStatus();
    setInterval(checkStatus, 5000);
  </script>
</body>
</html>
