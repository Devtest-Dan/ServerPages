<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Stream — ServerPages</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .live-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }
    .live-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .live-header h2 { font-size: 20px; }
    .player-wrapper {
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stream-info {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 24px;
      font-size: 13px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }
    .toggle-group {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
    }
    .toggle-group.right { margin-left: auto; }
    .toggle-btn {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .toggle-btn:hover { color: var(--text); }
    .toggle-btn.active {
      background: var(--accent);
      color: #000;
    }
    .toggle-btn:disabled {
      opacity: 0.5;
      cursor: wait;
    }
    .overlay-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .overlay-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .play-btn {
      padding: 10px 28px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .play-btn:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <div class="header">
    <h1>ServerPages</h1>
    <span class="status-dot" id="statusDot"></span>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/live.html" class="active">Live</a>
      <a href="/media.html">Media</a>
    </nav>
  </div>

  <div class="live-container">
    <div class="live-header">
      <span class="live-badge" id="liveBadge" style="display:none">LIVE</span>
      <h2>Screen Stream</h2>
    </div>

    <div class="player-wrapper">
      <video id="player" autoplay playsinline controls></video>
      <div class="player-overlay" id="overlay">
        <div class="overlay-content">
          <div class="overlay-spinner" id="overlaySpinner"></div>
          <span id="overlayText">Checking stream...</span>
        </div>
      </div>
    </div>

    <div class="stream-info">
      <span id="resolution">—</span>
      <span id="uptime">—</span>
      <span id="status">Connecting...</span>

      <div class="toggle-group">
        <button class="toggle-btn" data-mode="hls" onclick="switchMode('hls')">HLS</button>
        <button class="toggle-btn" data-mode="ws" onclick="switchMode('ws')">Low Latency</button>
      </div>

      <div class="toggle-group right">
        <button class="toggle-btn" data-quality="720p" onclick="setQuality('720p')">720p</button>
        <button class="toggle-btn" data-quality="1080p" onclick="setQuality('1080p')">1080p</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
  <script>
    const video = document.getElementById('player');
    const overlay = document.getElementById('overlay');
    const overlaySpinner = document.getElementById('overlaySpinner');
    const overlayText = document.getElementById('overlayText');
    const statusDot = document.getElementById('statusDot');
    const liveBadge = document.getElementById('liveBadge');
    const statusEl = document.getElementById('status');
    const resEl = document.getElementById('resolution');

    let hls = null;
    let ws = null;
    let mediaSource = null;
    let sourceBuffer = null;
    let pendingBuffers = [];
    let canPlayHandler = null;
    let currentMode = 'hls';
    let retryTimeout = null;
    let retryDelay = 5000;
    const MAX_RETRY_DELAY = 15000;

    // ── Overlay helpers ──────────────────────────────────────────────────────
    function showOverlay(text, spinner = true) {
      overlay.classList.remove('hidden');
      overlayText.textContent = text;
      overlaySpinner.style.display = spinner ? '' : 'none';
      // Remove any play button
      const btn = overlay.querySelector('.play-btn');
      if (btn) btn.remove();
    }

    function showPlayButton() {
      overlay.classList.remove('hidden');
      overlaySpinner.style.display = 'none';
      overlayText.textContent = 'Autoplay blocked';
      if (!overlay.querySelector('.play-btn')) {
        const btn = document.createElement('button');
        btn.className = 'play-btn';
        btn.textContent = 'Click to Play';
        btn.onclick = () => {
          video.play().then(() => hideOverlay()).catch(() => {});
        };
        overlay.querySelector('.overlay-content').appendChild(btn);
      }
    }

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    function setLive(live) {
      statusDot.classList.toggle('live', live);
      liveBadge.style.display = live ? '' : 'none';
      statusEl.textContent = live ? 'Streaming' : 'Offline';
    }

    // ── Status-first check ───────────────────────────────────────────────────
    async function checkAndConnect() {
      clearTimeout(retryTimeout);
      showOverlay('Checking stream...');
      try {
        const res = await fetch('/api/status');
        const data = await res.json();

        updateModeButtons(data.streamMode || 'hls');
        updateQualityButtons(data.quality);
        currentMode = data.streamMode || 'hls';

        if (data.uptime) updateUptime(data.uptime);

        if (!data.ffmpeg) {
          showOverlay('FFmpeg not running', false);
          scheduleRetry();
          return;
        }
        if (!data.streamReady) {
          showOverlay('FFmpeg starting...');
          scheduleRetry();
          return;
        }

        // Stream is ready — connect
        if (currentMode === 'ws') {
          connectWs();
        } else {
          connectHls();
        }
      } catch (e) {
        showOverlay('Server unreachable', false);
        scheduleRetry();
      }
    }

    function scheduleRetry() {
      const delay = retryDelay;
      retryDelay = Math.min(retryDelay * 2, MAX_RETRY_DELAY);
      retryTimeout = setTimeout(checkAndConnect, delay);
    }

    function resetRetry() {
      retryDelay = 5000;
    }

    // ── HLS Player ───────────────────────────────────────────────────────────
    function connectHls() {
      destroyWs();
      if (hls) { hls.destroy(); hls = null; }

      showOverlay('Connecting (HLS)...');

      if (Hls.isSupported()) {
        hls = new Hls({
          liveDurationInfinity: true,
          enableWorker: true,
          lowLatencyMode: true,
          backBufferLength: 0
        });

        hls.loadSource('/hls/screen.m3u8');
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          hideOverlay();
          setLive(true);
          resetRetry();
          video.play().then(() => {}).catch(() => showPlayButton());
        });

        hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) {
            hls.destroy();
            hls = null;
            setLive(false);
            showOverlay('Stream offline — reconnecting...', false);
            scheduleRetry();
          }
        });

        hls.on(Hls.Events.LEVEL_LOADED, () => {
          if (video.videoWidth) {
            resEl.textContent = `${video.videoWidth}x${video.videoHeight}`;
          }
        });

      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = '/hls/screen.m3u8';
        video.addEventListener('loadedmetadata', () => {
          hideOverlay();
          setLive(true);
          resetRetry();
          video.play().then(() => {}).catch(() => showPlayButton());
        }, { once: true });
        video.addEventListener('error', () => {
          setLive(false);
          showOverlay('Stream offline — reconnecting...', false);
          scheduleRetry();
        }, { once: true });
      }
    }

    // ── WebSocket + MSE Player ───────────────────────────────────────────────
    function connectWs() {
      destroyHls();
      destroyWs();

      showOverlay('Connecting (Low Latency)...');

      if (!('MediaSource' in window)) {
        showOverlay('MediaSource not supported in this browser', false);
        return;
      }

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}/ws/stream`);
      ws.binaryType = 'arraybuffer';

      mediaSource = new MediaSource();
      video.src = URL.createObjectURL(mediaSource);

      let msReady = false;
      let preOpenChunks = [];

      mediaSource.addEventListener('sourceopen', () => {
        try {
          sourceBuffer = mediaSource.addSourceBuffer('video/mp4; codecs="avc1.42E01E"');
          sourceBuffer.mode = 'segments';
          msReady = true;

          sourceBuffer.addEventListener('updateend', flushPending);

          // Flush any chunks received before sourceopen
          for (const chunk of preOpenChunks) {
            appendBuffer(chunk);
          }
          preOpenChunks = [];
        } catch (e) {
          showOverlay('Codec not supported', false);
        }
      });

      ws.onopen = () => {
        resetRetry();
      };

      ws.onmessage = (evt) => {
        const data = new Uint8Array(evt.data);
        if (!msReady) {
          preOpenChunks.push(data);
          return;
        }

        hideOverlay();
        setLive(true);
        appendBuffer(data);

        // Trim buffer to ~5s
        trimBuffer();

        // Track resolution
        if (video.videoWidth) {
          resEl.textContent = `${video.videoWidth}x${video.videoHeight}`;
        }
      };

      ws.onclose = () => {
        setLive(false);
        showOverlay('Connection lost — reconnecting...', false);
        scheduleRetry();
      };

      ws.onerror = () => {
        // onclose will fire after this
      };

      // Auto-play once we have data (track handler for cleanup)
      if (canPlayHandler) video.removeEventListener('canplay', canPlayHandler);
      canPlayHandler = function onCanPlay() {
        video.removeEventListener('canplay', canPlayHandler);
        canPlayHandler = null;
        video.play().then(() => {}).catch(() => showPlayButton());
      };
      video.addEventListener('canplay', canPlayHandler);
    }

    const MAX_PENDING = 30;

    function appendBuffer(data) {
      if (!sourceBuffer || mediaSource.readyState !== 'open') return;
      if (sourceBuffer.updating) {
        pendingBuffers.push(data);
        // Drop oldest frames if backpressure builds up
        while (pendingBuffers.length > MAX_PENDING) pendingBuffers.shift();
      } else {
        try {
          sourceBuffer.appendBuffer(data);
        } catch (e) {
          // QuotaExceededError — trim and retry
          pendingBuffers.push(data);
          while (pendingBuffers.length > MAX_PENDING) pendingBuffers.shift();
          trimBuffer(true);
        }
      }
    }

    function flushPending() {
      if (!sourceBuffer || sourceBuffer.updating || pendingBuffers.length === 0) return;
      const next = pendingBuffers.shift();
      try {
        sourceBuffer.appendBuffer(next);
      } catch (e) {
        // drop frame on error
      }
    }

    function trimBuffer(force) {
      if (!sourceBuffer || sourceBuffer.updating || !video.buffered.length) return;
      const end = video.buffered.end(video.buffered.length - 1);
      const start = video.buffered.start(0);
      if (force || end - start > 5) {
        try {
          sourceBuffer.remove(start, Math.max(start, end - 3));
        } catch (e) {}
      }
    }

    // ── Cleanup ──────────────────────────────────────────────────────────────
    function destroyHls() {
      if (hls) { hls.destroy(); hls = null; }
    }

    function destroyWs() {
      if (canPlayHandler) {
        video.removeEventListener('canplay', canPlayHandler);
        canPlayHandler = null;
      }
      if (ws) {
        ws.onclose = null;
        ws.onerror = null;
        ws.onmessage = null;
        try { ws.close(); } catch (e) {}
        ws = null;
      }
      if (mediaSource && mediaSource.readyState === 'open') {
        try { mediaSource.endOfStream(); } catch (e) {}
      }
      mediaSource = null;
      sourceBuffer = null;
      pendingBuffers = [];
    }

    // ── Mode toggle ──────────────────────────────────────────────────────────
    function updateModeButtons(mode) {
      document.querySelectorAll('[data-mode]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
    }

    async function switchMode(mode) {
      if (mode === currentMode) return;
      const btns = document.querySelectorAll('[data-mode]');
      btns.forEach(b => b.disabled = true);

      try {
        const res = await fetch('/api/mode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode })
        });
        const data = await res.json();
        currentMode = data.streamMode;
        updateModeButtons(currentMode);

        if (data.changed) {
          // Immediately tear down current player to prevent stale errors
          destroyHls();
          destroyWs();
          setLive(false);
          showOverlay(`Switching to ${mode === 'ws' ? 'Low Latency' : 'HLS'}...`);
          clearTimeout(retryTimeout);
          // Give FFmpeg time to restart
          setTimeout(checkAndConnect, 3000);
        }
      } catch (e) {}

      btns.forEach(b => b.disabled = false);
    }

    // ── Quality toggle ───────────────────────────────────────────────────────
    function updateQualityButtons(quality) {
      document.querySelectorAll('[data-quality]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.quality === quality);
      });
    }

    async function setQuality(quality) {
      const btns = document.querySelectorAll('[data-quality]');
      btns.forEach(b => b.disabled = true);

      try {
        const res = await fetch('/api/quality', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ quality })
        });
        const data = await res.json();
        updateQualityButtons(data.quality);

        if (data.changed) {
          setLive(false);
          showOverlay(`Switching to ${quality}...`);
          clearTimeout(retryTimeout);
          setTimeout(checkAndConnect, 4000);
        }
      } catch (e) {}

      btns.forEach(b => b.disabled = false);
    }

    // ── Periodic status ──────────────────────────────────────────────────────
    function updateUptime(secs) {
      const mins = Math.floor(secs / 60);
      const hrs = Math.floor(mins / 60);
      document.getElementById('uptime').textContent =
        hrs > 0 ? `Uptime: ${hrs}h ${mins % 60}m` : `Uptime: ${mins}m`;
    }

    async function pollStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        if (data.uptime) updateUptime(data.uptime);
        if (data.quality) updateQualityButtons(data.quality);
        if (data.streamMode) updateModeButtons(data.streamMode);
      } catch (e) {}
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    checkAndConnect();
    setInterval(pollStatus, 10000);
  </script>
</body>
</html>
